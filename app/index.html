  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--ma-warm-100); font-family: var(--font-sans); color: var(--color-text); }
    #root { min-height: 100vh; }
    button { font-family: inherit; }

    /* Page transition — opacity only, no transform, so .ma-content does not become a containing block for fixed descendants (drawers, modals). */
    @keyframes pageEnter {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .ma-content { animation: pageEnter 320ms cubic-bezier(.22,.61,.36,1) both; }

    /* ===== Drawer system — shared by ALL drawers ===== */
    @keyframes drawerBackdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes drawerPanelIn {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes drawerBackdropOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    @keyframes drawerPanelOut {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(100%); opacity: 0; }
    }

    /* backdrop */
    .ma-drawer-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(47,62,34,.32);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; justify-content: flex-end;
      animation: drawerBackdropIn 240ms cubic-bezier(.22,.61,.36,1) both;
    }
    /* panel */
    .ma-drawer-panel {
      width: 520px;
      background: var(--ma-warm-100);
      height: 100vh;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-lg);
      animation: drawerPanelIn 360ms cubic-bezier(.22,.61,.36,1) both;
      overflow: hidden;
    }
    @media (max-width: 768px) {
      .ma-drawer-panel { width: 100vw !important; }
    }
    /* header */
    .ma-drawer-header {
      padding: 20px 28px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--color-border-subtle);
      flex-shrink: 0;
    }
    .ma-drawer-eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--ma-olive-700);
    }
    .ma-drawer-title {
      font-size: 18px; font-weight: 600;
      color: var(--ma-olive-900); margin-top: 2px;
    }
    /* scrollable body */
    .ma-drawer-body {
      padding: 24px 28px;
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 18px;
    }
    /* sticky footer */
    .ma-drawer-footer {
      padding: 20px 28px;
      border-top: 1px solid var(--color-border-subtle);
      display: flex; gap: 10px;
      flex-shrink: 0;
    }
    /* field label */
    .ma-drawer-label {
      display: block;
      font-size: 13px; font-weight: 600;
      color: var(--ma-brown-900);
      margin-bottom: 6px;
    }

    /* misc */
    @keyframes toastIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ddIn     { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes slideIn  { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes scaleIn  { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
    @keyframes authFadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* ===== Responsive (desktop-first) ===== */
    @media (max-width: 1280px) {
      .ma-content { padding: 24px !important; }
      .ma-grid-4 { grid-template-columns: repeat(3, 1fr) !important; }
      .ma-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
    }

    @media (max-width: 1024px) {
      aside.ma-sidebar { width: 220px !important; }
      .ma-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
      .ma-split-2-1, .ma-split-3-2 { grid-template-columns: 1fr !important; }
      .ma-topbar { padding: 0 20px !important; gap: 12px !important; }
      .ma-search { width: 200px !important; }
    }

    @media (max-width: 768px) {
      aside.ma-sidebar { display: none !important; }
      .ma-content { padding: 16px !important; }
      .ma-grid-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
      .ma-grid-3 { grid-template-columns: 1fr !important; }
      .ma-grid-2 { grid-template-columns: 1fr !important; }
      .ma-search { display: none !important; }
      .ma-topbar { padding: 0 16px !important; height: 60px !important; }
      .ma-hero-h1 { font-size: 24px !important; line-height: 1.2 !important; }
      .ma-hero { padding: 22px 22px !important; }
      .ma-hero-row { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
      .ma-page-header { flex-direction: column !important; align-items: flex-start !important; gap: 14px !important; }
      .ma-piece-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
      .ma-table { font-size: 13px !important; }
      .ma-table th, .ma-table td { padding: 12px 14px !important; }
      .ma-drawer { width: 100vw !important; }

      .ma-bottom-nav {
        position: fixed;
        bottom: 16px; left: 16px; right: 16px;
        display: flex !important;
        background: var(--ma-olive-900);
        color: var(--ma-warm-100);
        border-radius: 999px;
        padding: 8px;
        gap: 4px;
        z-index: 40;
        box-shadow: 0 16px 32px rgba(47,62,34,.30);
        justify-content: space-around;
      }
      .ma-bottom-nav button {
        flex: 1;
        background: transparent;
        border: 0;
        padding: 10px 6px;
        border-radius: 999px;
        color: rgba(246,244,238,.7);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
      }
      .ma-bottom-nav button[data-active="true"] {
        background: var(--ma-warm-100);
        color: var(--ma-olive-900);
      }
      .ma-main { padding-bottom: 88px !important; }
    }
    .ma-bottom-nav { display: none; }
  </style>
</head>

/* ── DROPDOWN (design-system, replaces native <select>) ── */
function Dropdown({value,onChange,options,placeholder="Selecione",error,size="md",icon,variant="input",align="left",style}){
  // variant: "input" (form select) | "ghost" (header period chip)
  const[open,setOpen]=React.useState(false);
  const[highlight,setHighlight]=React.useState(-1);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!open)return;
    const close=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    const esc=e=>{if(e.key==="Escape")setOpen(false);};
    window.addEventListener("mousedown",close);
    window.addEventListener("keydown",esc);
    return()=>{window.removeEventListener("mousedown",close);window.removeEventListener("keydown",esc);};
  },[open]);
  const opts=options.map(o=>typeof o==="string"?{value:o,label:o}:o);
  const selected=opts.find(o=>o.value===value);
  const baseTriggerInput={
    width:"100%",fontFamily:"var(--font-sans)",
    fontSize:14,
    padding:"11px 14px",
    borderRadius:12,
    border:`1.5px solid ${error?"var(--ma-error-500)":(open?"var(--ma-olive-700)":"var(--color-border)")}`,
    background:error?"rgba(184,92,74,.06)":"var(--ma-warm-100)",
    color:selected?"var(--ma-brown-900)":"var(--ma-taupe-500)",
    outline:"none",boxSizing:"border-box",cursor:"pointer",
    textAlign:"left",
    transition:"border-color 160ms,box-shadow 160ms",
    boxShadow:open?"var(--shadow-focus)":"none",
    display:"flex",alignItems:"center",gap:8,
  };
  const baseTriggerGhost={
    fontFamily:"var(--font-sans)",
    fontSize:13,fontWeight:600,
    padding:"9px 14px",borderRadius:12,
    border:`1.5px solid ${open?"var(--ma-olive-700)":"var(--ma-sage-300)"}`,
    background:open?"var(--ma-sand-200)":"transparent",
    color:"var(--ma-olive-800)",
    cursor:"pointer",
    transition:"all 160ms",
    display:"inline-flex",alignItems:"center",gap:8,
    fontFamilyVar:"var(--font-sans)",
  };
  const trigger=variant==="ghost"?baseTriggerGhost:baseTriggerInput;
  return(
    <div ref={ref} style={{position:"relative",...style}}>
      <button type="button" onClick={()=>setOpen(o=>!o)} style={trigger}
        onMouseEnter={e=>{if(variant==="ghost"&&!open)e.currentTarget.style.background="var(--ma-sand-200)";}}
        onMouseLeave={e=>{if(variant==="ghost"&&!open)e.currentTarget.style.background="transparent";}}>
        {icon&&<span style={{display:"flex",color:"var(--ma-olive-700)",flexShrink:0}}>{icon}</span>}
        <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>{selected?selected.label:placeholder}</span>
        <IconChevronDown size={14} style={{color:"var(--ma-taupe-500)",transition:"transform 220ms cubic-bezier(.22,.61,.36,1)",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0}}/>
      </button>
      {open&&(
        <div role="listbox" style={{
          position:"absolute",top:"calc(100% + 6px)",
          [align==="right"?"right":"left"]:0,
          minWidth:"100%",
          background:"var(--ma-white)",
          border:"1px solid var(--color-border-subtle)",
          borderRadius:14,
          boxShadow:"0 16px 40px rgba(47,62,34,.14)",
          padding:4,
          zIndex:60,
          maxHeight:280,overflow:"auto",
          animation:"ddIn 200ms cubic-bezier(.22,.61,.36,1) both",
        }}>
          {opts.map((o,i)=>{
            const sel=o.value===value;
            const hi=i===highlight;
            return(
              <button key={o.value} type="button"
                onMouseEnter={()=>setHighlight(i)}
                onMouseLeave={()=>setHighlight(-1)}
                onClick={()=>{onChange&&onChange(o.value);setOpen(false);}}
                style={{
                  display:"flex",alignItems:"center",gap:8,
                  width:"100%",textAlign:"left",
                  padding:"10px 10px",borderRadius:10,
                  background:sel?"rgba(79,98,59,.10)":(hi?"var(--ma-sand-200)":"transparent"),
                  color:sel?"var(--ma-olive-900)":"var(--ma-brown-900)",
                  fontWeight:sel?600:500,
                  fontSize:14,
                  border:0,cursor:"pointer",
                  fontFamily:"var(--font-sans)",
                  transition:"background 120ms",
                }}>
                {o.icon&&<span style={{color:sel?"var(--ma-olive-700)":"var(--ma-taupe-500)",display:"flex"}}>{o.icon}</span>}
                <span style={{flex:1}}>{o.label}</span>
                {sel&&<IconCheck size={14} style={{color:"var(--ma-olive-700)"}}/>}
              </button>
            );
          })}
        </div>
      )}
      <style>{`@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

function RevenueChart(){
  const months=["jan","fev","mar","abr","mai"];
  const consigna=[320,410,380,520,480];
  const loja=[880,1020,1340,1180,1620];
  const feira=[240,360,280,420,720];
  const max=2600;
  const BAR_H=160;
  const h=val=>Math.round((val/max)*BAR_H);
  return(
    <div>
      <div style={{display:"flex",gap:20,marginBottom:16,flexWrap:"wrap"}}>
        <LegendDot color="var(--ma-olive-700)"label="Loja própria"/>

      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:10,height:BAR_H+40,paddingBottom:0}}>
        {months.map((m,i)=>{
          const total=consigna[i]+loja[i]+feira[i];
          return(
            <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:0,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:"var(--ma-olive-900)",marginBottom:6,whiteSpace:"nowrap"}}>

                <div style={{height:h(feira[i]),background:"var(--ma-gold-500)",flexShrink:0}}/>
                <div style={{height:h(consigna[i]),background:"var(--ma-sage-500)",flexShrink:0}}/>
                <div style={{height:h(loja[i]),background:"var(--ma-olive-700)",flexShrink:0}}/>

            </div>

}

function CriarLookDrawer({onClose,onSave}){
  const[nome,setNome]=React.useState("");
  const[desc,setDesc]=React.useState("");
  const[pecas,setPecas]=React.useState([]);
  const allPecas=PIECES.map(p=>p.name);
  const toggle=p=>setPecas(ps=>ps.includes(p)?ps.filter(x=>x!==p):[...ps,p]);
  const inputSt={width:"100%",fontFamily:"var(--font-sans)",fontSize:14,padding:"11px 14px",borderRadius:12,border:"1.5px solid var(--color-border)",background:"var(--ma-warm-100)",color:"var(--ma-brown-900)",outline:"none",boxSizing:"border-box"};
  return(
    <div className="ma-drawer-backdrop" onClick={onClose}>
      <div className="ma-drawer-panel" onClick={e=>e.stopPropagation()}>
        <div className="ma-drawer-header">
          <div>
            <div className="ma-drawer-eyebrow">Novo look</div>
            <div className="ma-drawer-title">Criar combinação</div>
          </div>
          <IconButton label="Fechar" onClick={onClose}><IconClose size={18}/></IconButton>
        </div>
        <div className="ma-drawer-body">
          <div>
            <label className="ma-drawer-label">Nome do look <span style={{color:"var(--ma-error-500)"}}>*</span></label>
            <input style={inputSt} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: Look de verão com jeans"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </div>
          <div>
            <label className="ma-drawer-label">Descrição</label>
            <textarea style={{...inputSt,resize:"vertical",minHeight:80,lineHeight:1.5}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Contexto, ocasião, inspiração…"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </div>
          <div>
            <label className="ma-drawer-label">Selecionar peças <span style={{fontSize:12,color:"var(--ma-taupe-500)",fontWeight:400}}>({pecas.length} selecionadas)</span></label>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {allPecas.map((p,i)=>{
                const sel=pecas.includes(p);
                return(
                  <button key={i} type="button" onClick={()=>toggle(p)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:`1.5px solid ${sel?"var(--ma-olive-700)":"var(--color-border)"}`,background:sel?"rgba(79,98,59,.07)":"var(--ma-white)",cursor:"pointer",textAlign:"left",transition:"all 160ms",fontFamily:"var(--font-sans)"}}>
                    <div style={{width:18,height:18,borderRadius:6,border:`2px solid ${sel?"var(--ma-olive-700)":"var(--ma-taupe-300)"}`,background:sel?"var(--ma-olive-700)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 160ms"}}>
                      {sel&&<IconCheck size={10} style={{color:"white"}}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:500,color:"var(--ma-olive-900)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                      <div style={{fontSize:12,color:"var(--ma-taupe-500)",marginTop:1}}>{PIECES[i]?.category} · Tam {PIECES[i]?.size}</div>
                    </div>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--ma-olive-700)"}}>R$ {PIECES[i]?.price}</div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
        <div className="ma-drawer-footer">
          <Button variant="secondary" style={{flex:1}} onClick={onClose} type="button">Cancelar</Button>
          <Button style={{flex:2}} icon={<IconCheck size={16}/>} onClick={()=>{if(!nome.trim())return;onSave(nome,pecas);}}>Salvar look</Button>
        </div>
      </div>
    </div>
  );
}

function RegistrarVendaDrawer({onClose,onSave}){
  const[form,setForm]=React.useState({peca:"",compradora:"",canal:"loja",valor:"",data:new Date().toISOString().slice(0,10),obs:""});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const[errors,setErrors]=React.useState({});
  const inputSt=err=>({width:"100%",fontFamily:"var(--font-sans)",fontSize:14,padding:"11px 14px",borderRadius:12,border:`1.5px solid ${err?"var(--ma-error-500)":"var(--color-border)"}`,background:"var(--ma-warm-100)",color:"var(--ma-brown-900)",outline:"none",boxSizing:"border-box"});
  const canais=[{value:"loja",label:"Loja própria"},{value:"consignacao",label:"Consignação"},{value:"feira",label:"Feira virtual"},{value:"whatsapp",label:"WhatsApp direto"}];
  const pecaOpts=PIECES.map(p=>({value:p.name,label:p.name+" — R$ "+p.price}));
  const validate=()=>{
    const e={};
    if(!form.peca)e.peca=true;
    if(!form.compradora.trim())e.compradora=true;
    if(!form.valor||isNaN(parseFloat(form.valor.replace(",","."))))e.valor=true;
    setErrors(e);
    return Object.keys(e).length===0;
  };
  return(
    <div className="ma-drawer-backdrop" onClick={onClose}>
      <div className="ma-drawer-panel" onClick={e=>e.stopPropagation()}>
        <div className="ma-drawer-header">
          <div>
            <div className="ma-drawer-eyebrow">Nova venda</div>
            <div className="ma-drawer-title">Registrar venda</div>
          </div>
          <IconButton label="Fechar" onClick={onClose}><IconClose size={18}/></IconButton>
        </div>
        <div className="ma-drawer-body">
          <div>
            <label className="ma-drawer-label">Peça vendida <span style={{color:"var(--ma-error-500)"}}>*</span></label>
            <Dropdown value={form.peca} onChange={v=>setForm(f=>({...f,peca:v}))} options={pecaOpts} placeholder="Selecione a peça" error={errors.peca}/>
            {errors.peca&&<div style={{fontSize:12,color:"var(--ma-error-500)",marginTop:4}}>Selecione a peça</div>}
          </div>
          <div>
            <label className="ma-drawer-label">Compradora <span style={{color:"var(--ma-error-500)"}}>*</span></label>
            <input style={inputSt(errors.compradora)} value={form.compradora} onChange={set("compradora")} placeholder="Nome da compradora"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            {errors.compradora&&<div style={{fontSize:12,color:"var(--ma-error-500)",marginTop:4}}>Informe o nome</div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div>
              <label className="ma-drawer-label">Canal de venda</label>
              <Dropdown value={form.canal} onChange={v=>setForm(f=>({...f,canal:v}))} options={canais}/>
            </div>
            <div>
              <label className="ma-drawer-label">Data da venda</label>
              <input type="date" style={inputSt(false)} value={form.data} onChange={set("data")}
                onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            </div>
          </div>

function CadastroPeca({onClose,onSave}){
  const[form,setForm]=React.useState({nome:"",categoria:"",tamanho:"",preco:"",procedencia:"",colecao:"",etiqueta:"",status:"Disponível",notas:""});
  const[errors,setErrors]=React.useState({});

  function validate(){const e={};if(!form.nome.trim())e.nome="Obrigatório";if(!form.categoria)e.categoria="Obrigatório";if(!form.tamanho.trim())e.tamanho="Obrigatório";if(!form.preco||isNaN(Number(form.preco)))e.preco="Valor inválido";return e;}
  function submit(e){e.preventDefault();const e2=validate();if(Object.keys(e2).length){setErrors(e2);return;}onSave&&onSave(form);onClose();}
  const categorias=["Vestido","Camisa","Blusa","Calça","Saia","Blazer","Casaco","Top","Acessório","Calçado","Outro"];
  const tamanhos=["PP","P","M","G","GG","XGG","34","36","38","40","42","44","46","U"];
  const statusOpts=["Disponível","Em curadoria","Consignada","Parada","Vendida"];
  const Field=({label,err,children})=><label style={{display:"block"}}><div style={{fontSize:13,fontWeight:600,color:err?"var(--ma-error-500)":"var(--ma-brown-900)",marginBottom:6}}>{label}</div>{children}{err&&<div style={{fontSize:12,color:"var(--ma-error-500)",marginTop:4}}>{err}</div>}</label>;
  const inputSt=err=>({width:"100%",fontFamily:"var(--font-sans)",fontSize:14,padding:"11px 14px",borderRadius:12,border:`1.5px solid ${err?"var(--ma-error-500)":"var(--color-border)"}`,background:"var(--ma-warm-100)",color:"var(--ma-brown-900)",outline:"none",boxSizing:"border-box"});
  const selectSt=err=>({...inputSt(err),appearance:"none",cursor:"pointer"});
  return(
    <div className="ma-drawer-backdrop" onClick={onClose}>
      <div className="ma-drawer-panel" onClick={e=>e.stopPropagation()}>

        {/* foto placeholder */}
        <div style={{margin:"24px 28px 0",background:"var(--ma-sand-200)",borderRadius:20,aspectRatio:"16/7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,border:"2px dashed var(--ma-sage-300)",cursor:"pointer",flexShrink:0}}>
          <div style={{width:44,height:44,borderRadius:999,background:"var(--ma-white)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--shadow-xs)"}}><IconCamera size={20} style={{color:"var(--ma-olive-700)"}}/></div>
          <div style={{fontSize:13,fontWeight:600,color:"var(--ma-olive-900)"}}>Adicionar fotos</div>
          <div style={{fontSize:12,color:"var(--ma-taupe-500)"}}>JPG, PNG ou WEBP · até 10 MB</div>
        </div>

        <form onSubmit={submit} className="ma-drawer-body">
          <Field label="Nome da peça *" err={errors.nome}>
            <input style={inputSt(errors.nome)} value={form.nome} onChange={set("nome")} placeholder="Ex: Vestido midi linho areia"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <Field label="Categoria *" err={errors.categoria}>
              <Dropdown value={form.categoria} onChange={v=>setForm(f=>({...f,categoria:v}))} options={categorias} placeholder="Selecione" error={errors.categoria}/>
            </Field>
            <Field label="Tamanho *" err={errors.tamanho}>
              <Dropdown value={form.tamanho} onChange={v=>setForm(f=>({...f,tamanho:v}))} options={tamanhos} placeholder="Selecione" error={errors.tamanho}/>
            </Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <Field label="Valor de venda (R$) *" err={errors.preco}>
              <input style={inputSt(errors.preco)} value={form.preco} onChange={set("preco")} placeholder="0,00" inputMode="decimal"
                onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            </Field>
            <Field label="Status">
              <Dropdown value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={statusOpts}/>
            </Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <Field label="Procedência">
              <input style={inputSt(false)} value={form.procedencia} onChange={set("procedencia")} placeholder="Ex: Estoque próprio"
                onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            </Field>
            <Field label="Coleção">
              <input style={inputSt(false)} value={form.colecao} onChange={set("colecao")} placeholder="Ex: Outono / Inverno"
                onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            </Field>
          </div>
          <Field label="Etiqueta / código">
            <input style={inputSt(false)} value={form.etiqueta} onChange={set("etiqueta")} placeholder="Ex: MA-0129"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </Field>
          <Field label="Notas internas">
            <textarea style={{...inputSt(false),resize:"vertical",minHeight:80,lineHeight:1.5}} value={form.notas} onChange={set("notas")} placeholder="Observações sobre a peça, histórico, etc."
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </Field>
          <div className="ma-drawer-footer" style={{margin:"0 -28px -24px",padding:"20px 28px"}}>
            <Button variant="secondary" style={{flex:1}} onClick={onClose} type="button">Cancelar</Button>
            <Button style={{flex:2}} type="submit" icon={<IconCheck size={16}/>}>Cadastrar peça</Button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ── CADASTRO (3 steps) ── */
function RegisterScreen({onGoLogin,onRegister}){
  const[step,setStep]=React.useState(0);
  const[form,setForm]=React.useState({nome:"",email:"",senha:"",confirma:"",perfil:"proprio"});
  const[lgpd,setLgpd]=React.useState(false);
  const[lgpdErr,setLgpdErr]=React.useState(false);
  const[errors,setErrors]=React.useState({});
  const[slide,setSlide]=React.useState(0);
  React.useEffect(()=>{
    const t=setInterval(()=>setSlide(s=>(s+1)%SLIDESHOW_SLIDES.length),6000);
    return()=>clearInterval(t);
  },[]);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function validateStep(){
    const e={};
    if(step===0){
      if(!form.nome.trim())e.nome="Digite seu nome";
      if(!form.email.includes("@"))e.email="E-mail inválido";
    }
    if(step===1){
      if(form.senha.length<6)e.senha="Mínimo 6 caracteres";
      if(form.senha!==form.confirma)e.confirma="Senhas não conferem";
    }
    return e;
  }

  function next(e){
    e.preventDefault();
    const e2=validateStep();
    if(Object.keys(e2).length){setErrors(e2);return;}
    setErrors({});
    if(step<2)setStep(s=>s+1);
    else{
      if(!lgpd){setLgpdErr(true);return;}
      setLgpdErr(false);
      onRegister(form);
    }
  }

  const perfis=[
    {id:"proprio",label:"Guarda-roupa pessoal",desc:"Organizo minhas próprias peças"},
    {id:"brecho",label:"Brechó",desc:"Tenho um negócio de moda circular"},
    {id:"consig",label:"Consignação",desc:"Trabalho com parceiras e comissões"},
  ];

  return(
    <div className="auth-wrap">
      <style>{authStyles}</style>
      <AuthVisual slide={slide}/>
      <div className="auth-panel">
        <div className="auth-card">
          <a href="../landing/index.html" className="auth-logo" style={{display:"block"}}><img src="./logo.png" alt="Minha Arara" style={{height:34}}/></a>
          <div className="auth-step-dots">
            {[0,1,2].map(i=><div key={i} className={`auth-dot${step===i?" on":""}`}/>)}
          </div>

          {step===0&&(
            <>
              <h1 className="auth-heading">Crie sua conta.</h1>
              <p className="auth-sub">Comece grátis — sem cartão de crédito.</p>
              <form onSubmit={next}>
                <div className="auth-field">
                  <label className="auth-label">Nome completo</label>
                  <input className={`auth-input${errors.nome?" err":""}`} type="text" value={form.nome} onChange={set("nome")} placeholder="Priscila Villela" autoComplete="name"/>
                  {errors.nome&&<span style={{fontSize:12,color:"var(--ma-error-500)",marginTop:2}}>{errors.nome}</span>}
                </div>
                <div className="auth-field">
                  <label className="auth-label">E-mail</label>
                  <input className={`auth-input${errors.email?" err":""}`} type="email" value={form.email} onChange={set("email")} placeholder="marina@exemplo.com" autoComplete="email"/>
                  {errors.email&&<span style={{fontSize:12,color:"var(--ma-error-500)",marginTop:2}}>{errors.email}</span>}
                </div>
                <button className="auth-btn" type="submit">Continuar</button>
              </form>
            </>
          )}

          {step===1&&(
            <>
              <button className="auth-back" onClick={()=>setStep(0)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
                Voltar
              </button>
              <h1 className="auth-heading">Crie sua senha.</h1>
              <p className="auth-sub">Mínimo 6 caracteres. Use algo só seu.</p>
              <form onSubmit={next}>
                <div className="auth-field">
                  <label className="auth-label">Senha</label>
                  <input className={`auth-input${errors.senha?" err":""}`} type="password" value={form.senha} onChange={set("senha")} placeholder="••••••••" autoComplete="new-password"/>
                  {errors.senha&&<span style={{fontSize:12,color:"var(--ma-error-500)",marginTop:2}}>{errors.senha}</span>}
                </div>
                <div className="auth-field">
                  <label className="auth-label">Confirmar senha</label>
                  <input className={`auth-input${errors.confirma?" err":""}`} type="password" value={form.confirma} onChange={set("confirma")} placeholder="••••••••" autoComplete="new-password"/>
                  {errors.confirma&&<span style={{fontSize:12,color:"var(--ma-error-500)",marginTop:2}}>{errors.confirma}</span>}
                </div>
                <button className="auth-btn" type="submit">Continuar</button>
              </form>
            </>
          )}

          {step===2&&(
            <>
              <button className="auth-back" onClick={()=>setStep(1)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
                Voltar
              </button>
              <h1 className="auth-heading">Como você usa?</h1>
              <p className="auth-sub">Escolha o perfil que melhor descreve a sua arara.</p>
              <form onSubmit={next}>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
                  {perfis.map(p=>(
                    <label key={p.id} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",borderRadius:14,border:`1.5px solid ${form.perfil===p.id?"var(--ma-olive-800)":"var(--color-border)"}`,background:form.perfil===p.id?"rgba(79,98,59,.07)":"var(--ma-white)",cursor:"pointer",transition:"all 160ms"}}>
                      <input type="radio" name="perfil" value={p.id} checked={form.perfil===p.id} onChange={set("perfil")} style={{accentColor:"var(--ma-olive-800)",width:16,height:16,flexShrink:0}}/>
                      <div>
                        <div style={{fontSize:14,fontWeight:600,color:"var(--ma-olive-900)"}}>{p.label}</div>
                        <div style={{fontSize:12,color:"var(--ma-taupe-500)",marginTop:3}}>{p.desc}</div>
                      </div>
                    </label>
                  ))}
                </div>
                <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",marginBottom:20,padding:"14px 16px",borderRadius:14,border:`1.5px solid ${lgpdErr?"var(--ma-error-500)":"var(--color-border)"}`,background:lgpdErr?"rgba(184,92,74,.05)":"var(--ma-warm-100)",transition:"border 160ms"}}>
                  <input type="checkbox" checked={lgpd} onChange={e=>{setLgpd(e.target.checked);if(e.target.checked)setLgpdErr(false);}} style={{accentColor:"var(--ma-olive-800)",width:16,height:16,marginTop:1,flexShrink:0}}/>
                  <span style={{fontSize:12,color:"var(--ma-brown-700)",lineHeight:1.55}}>
                    Li e concordo com os <a href="#" onClick={e=>e.preventDefault()} style={{color:"var(--ma-olive-700)",fontWeight:600,textDecoration:"underline"}}>Termos de Uso</a> e a <a href="#" onClick={e=>e.preventDefault()} style={{color:"var(--ma-olive-700)",fontWeight:600,textDecoration:"underline"}}>Política de Privacidade</a>, incluindo o tratamento de dados pessoais conforme a <strong>Lei 13.709/2018 (LGPD)</strong>.
                  </span>
                </label>
                {lgpdErr&&<div style={{fontSize:12,color:"var(--ma-error-500)",marginBottom:12,marginTop:-8}}>Aceite os termos para continuar.</div>}
                <button className="auth-btn" type="submit">Criar minha conta</button>
              </form>
            </>
          )}

          <div className="auth-link-row">
            Já tem conta?{" "}
            <span className="auth-link" onClick={onGoLogin}>Entrar</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── NOVO COMPROMISSO DRAWER ── */
function NovoCompromissoDrawer({onClose,onSave}){
  const[form,setForm]=React.useState({titulo:"",data:"",hora:"",local:"",tipo:"reuniao",notas:""});
  const[errors,setErrors]=React.useState({});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const inputSt=err=>({width:"100%",fontFamily:"var(--font-sans)",fontSize:14,padding:"11px 14px",borderRadius:12,border:`1.5px solid ${err?"var(--ma-error-500)":"var(--color-border)"}`,background:"var(--ma-warm-100)",color:"var(--ma-brown-900)",outline:"none",boxSizing:"border-box"});
  const tipoOpts=[
    {value:"sessao",label:"Sessão de fotos"},{value:"reuniao",label:"Reunião / repasse"},
    {value:"curadoria",label:"Curadoria de peças"},{value:"evento",label:"Bazar / evento"},
    {value:"lancamento",label:"Lançamento online"},{value:"interno",label:"Tarefa interna"},
  ];
  const corByTipo={sessao:"var(--ma-olive-800)",reuniao:"var(--ma-sage-500)",curadoria:"var(--ma-gold-500)",evento:"var(--ma-clay-500)",lancamento:"var(--ma-olive-700)",interno:"var(--ma-taupe-500)"};
  const validate=()=>{
    const e={};
    if(!form.titulo.trim())e.titulo=true;
    if(!form.data)e.data=true;
    setErrors(e);
    return Object.keys(e).length===0;
  };
  return(
    <div className="ma-drawer-backdrop" onClick={onClose}>
      <div className="ma-drawer-panel" onClick={e=>e.stopPropagation()}>
        <div className="ma-drawer-header">
          <div>
            <div className="ma-drawer-eyebrow">Agenda</div>
            <div className="ma-drawer-title">Novo compromisso</div>
          </div>
          <IconButton label="Fechar" onClick={onClose}><IconClose size={18}/></IconButton>
        </div>
        <div className="ma-drawer-body">
          <div>
            <label className="ma-drawer-label">Título <span style={{color:"var(--ma-error-500)"}}>*</span></label>
            <input style={inputSt(errors.titulo)} value={form.titulo} onChange={set("titulo")} placeholder="Ex: Reunião com Helena Marques"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            {errors.titulo&&<div style={{fontSize:12,color:"var(--ma-error-500)",marginTop:4}}>Informe o título</div>}
          </div>
          <div>
            <label className="ma-drawer-label">Tipo</label>
            <Dropdown value={form.tipo} onChange={v=>setForm(f=>({...f,tipo:v}))} options={tipoOpts}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div>
              <label className="ma-drawer-label">Data <span style={{color:"var(--ma-error-500)"}}>*</span></label>
              <input type="date" style={inputSt(errors.data)} value={form.data} onChange={set("data")}
                onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
              {errors.data&&<div style={{fontSize:12,color:"var(--ma-error-500)",marginTop:4}}>Informe a data</div>}
            </div>
            <div>
              <label className="ma-drawer-label">Horário</label>
              <input type="time" style={inputSt(false)} value={form.hora} onChange={set("hora")}
                onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
            </div>
          </div>
          <div>
            <label className="ma-drawer-label">Local</label>
            <input style={inputSt(false)} value={form.local} onChange={set("local")} placeholder="Ex: Estúdio, vídeo chamada, online…"
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </div>
          <div>
            <label className="ma-drawer-label">Notas</label>
            <textarea style={{...inputSt(false),resize:"vertical",minHeight:80,lineHeight:1.5}} value={form.notas} onChange={set("notas")} placeholder="Detalhes, material necessário, etc."
              onFocus={e=>e.target.style.boxShadow="var(--shadow-focus)"} onBlur={e=>e.target.style.boxShadow="none"}/>
          </div>
          {form.titulo&&form.data&&(
            <div style={{display:"flex",alignItems:"center",gap:14,background:"var(--ma-sand-200)",borderRadius:14,padding:"14px 16px"}}>
              <div style={{width:4,height:40,background:corByTipo[form.tipo]||"var(--ma-olive-700)",borderRadius:999,flexShrink:0}}/>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:"var(--ma-olive-900)"}}>{form.titulo}</div>
                <div style={{fontSize:12,color:"var(--ma-brown-700)",marginTop:2}}>{form.data}{form.hora?" · "+form.hora:""}{form.local?" · "+form.local:""}</div>
              </div>
            </div>
          )}
        </div>
        <div className="ma-drawer-footer">
          <Button variant="secondary" style={{flex:1}} onClick={onClose} type="button">Cancelar</Button>
          <Button style={{flex:2}} type="button" icon={<IconCheck size={16}/>} onClick={()=>{if(validate())onSave(form);}}>Adicionar à agenda</Button>
        </div>
      </div>
    </div>
  );
}

const RESULTS_PER_PAGE=6;

function searchItems(q){
  if(!q||q.length<1)return[];
  const lq=q.toLowerCase();
  return SEARCH_ALL.filter(r=>
    r.name.toLowerCase().includes(lq)||
    r.sub.toLowerCase().includes(lq)||
    (r.id&&String(r.id).toLowerCase().includes(lq))
  );
}

/* ── SEARCH BOX WITH AUTOCOMPLETE ── */
function SearchBox({onSearch}){
  const[q,setQ]=React.useState("");
  const[open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  const inputRef=React.useRef(null);
  const suggestions=q.trim().length>=1?searchItems(q).slice(0,5):[];

  React.useEffect(()=>{
    if(!open)return;
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    window.addEventListener("mousedown",handler);
    return()=>window.removeEventListener("mousedown",handler);
  },[open]);

  const submit=()=>{
    const v=q.trim();
    if(v){onSearch(v);setOpen(false);}
  };

  return(
    <div ref={ref} style={{position:"relative",width:320}} className="ma-search">
      <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"var(--ma-taupe-500)",display:"flex",zIndex:1,pointerEvents:"none"}}><IconSearch size={16}/></span>
      <input
        ref={inputRef}
        value={q}
        onChange={e=>{setQ(e.target.value);setOpen(true);}}
        onFocus={()=>{if(q.trim())setOpen(true);}}
        onKeyDown={e=>{if(e.key==="Enter"){submit();}if(e.key==="Escape"){setOpen(false);setQ("");inputRef.current&&inputRef.current.blur();}}}
        placeholder="Buscar peça, look ou etiqueta…"
        style={{width:"100%",fontFamily:"var(--font-sans)",fontSize:14,padding:"10px 14px 10px 38px",borderRadius:12,border:"1px solid var(--color-border)",background:"var(--ma-warm-100)",color:"var(--ma-brown-900)",outline:"none",boxSizing:"border-box",transition:"border-color 160ms,box-shadow 160ms"}}
        onFocusCapture={e=>{e.target.style.borderColor="var(--ma-olive-700)";e.target.style.boxShadow="var(--shadow-focus)";}}
        onBlurCapture={e=>{e.target.style.borderColor="var(--color-border)";e.target.style.boxShadow="none";}}
      />
      {open&&suggestions.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"var(--ma-white)",border:"1px solid var(--color-border-subtle)",borderRadius:16,boxShadow:"0 16px 40px rgba(47,62,34,.14)",zIndex:200,overflow:"hidden",animation:"ddIn 180ms cubic-bezier(.22,.61,.36,1) both"}}>
          {suggestions.map((item,i)=>(
            <button key={item.type+item.id} onMouseDown={e=>{e.preventDefault();onSearch(q.trim());setOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"10px 14px",background:"transparent",border:0,cursor:"pointer",textAlign:"left",fontFamily:"inherit",borderBottom:i<suggestions.length-1?"1px solid var(--color-border-subtle)":"none",transition:"background 120ms"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--ma-sand-200)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${item.gradient[0]},${item.gradient[1]})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <IconHanger size={18} strokeWidth={1.3} style={{color:"var(--ma-olive-800)",opacity:0.45}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--ma-olive-900)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                <div style={{fontSize:11,color:"var(--ma-taupe-500)",marginTop:1,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:3,color:"var(--ma-olive-700)"}}>{TYPE_ICONS[item.type]}<span style={{fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{TYPE_LABELS[item.type]}</span></span>
                  <span>·</span>
                  <span>{item.sub.split(" · ")[0]}</span>
                </div>
              </div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--ma-brown-900)",flexShrink:0}}>{item.meta}</div>
            </button>
          ))}
          <div style={{padding:"10px 14px",background:"var(--ma-warm-100)",borderTop:"1px solid var(--color-border-subtle)"}}>
            <button onMouseDown={e=>{e.preventDefault();submit();}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",background:"transparent",border:0,cursor:"pointer",fontFamily:"inherit",fontSize:13,color:"var(--ma-olive-700)",fontWeight:600,padding:0}}>
              <span>Ver todos os resultados de "{q.trim()}"</span>
              <IconArrowRight size={13}/>
            </button>
          </div>
        </div>
      )}
      {open&&q.trim().length>=1&&suggestions.length===0&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"var(--ma-white)",border:"1px solid var(--color-border-subtle)",borderRadius:16,boxShadow:"0 16px 40px rgba(47,62,34,.14)",zIndex:200,padding:"18px 16px",textAlign:"center",animation:"ddIn 180ms cubic-bezier(.22,.61,.36,1) both"}}>
          <div style={{fontSize:13,color:"var(--ma-taupe-500)"}}>Nenhum resultado para "<strong style={{color:"var(--ma-brown-900)"}}>{q}</strong>"</div>
        </div>
      )}
    </div>
  );
}

/* ── TOAST (global feedback for actions) ── */
const ToastContext=React.createContext(()=>{});
function ToastProvider({children}){
  const[toasts,setToasts]=React.useState([]);
  const show=React.useCallback((message,tone="success")=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,message,tone}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),5000);
  },[]);
  return(
    <ToastContext.Provider value={show}>
      {children}
      <div style={{position:"fixed",bottom:24,right:24,display:"flex",flexDirection:"column",gap:10,zIndex:200,pointerEvents:"none"}}>
        {toasts.map(t=>(
          <div key={t.id} style={{
            background:"var(--ma-white)",borderRadius:14,
            padding:"14px 18px",minWidth:260,maxWidth:380,
            boxShadow:"0 16px 40px rgba(47,62,34,.16)",
            border:"1px solid var(--color-border-subtle)",
            display:"flex",alignItems:"center",gap:12,
            animation:"toastIn 280ms cubic-bezier(.22,.61,.36,1) both",
          }}>
            <div style={{width:32,height:32,borderRadius:999,background:t.tone==="success"?"rgba(79,98,59,.14)":"rgba(200,164,106,.22)",color:t.tone==="success"?"var(--ma-olive-700)":"#7A5C24",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {t.tone==="success"?<IconCheck size={16}/>:<IconBell size={16}/>}
            </div>
            <div style={{fontSize:14,color:"var(--ma-olive-900)",fontWeight:500,lineHeight:1.4}}>{t.message}</div>
          </div>
        ))}
      </div>
      <style>{`@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </ToastContext.Provider>
  );
}
const useToast=()=>React.useContext(ToastContext);

/* ── APP ROOT ── */
function App(){
  const initScreen=new URLSearchParams(window.location.search).get("signup")==="1"?"register":"login";
  const[screen,setScreen]=React.useState(initScreen); // login | register | app
  const[loginError,setLoginError]=React.useState(false);
  const[route,setRoute]=React.useState("dashboard");
  const[selectedPiece,setSelectedPiece]=React.useState(null);
  const[cadastrando,setCadastrando]=React.useState(false);
  const[showNotifs,setShowNotifs]=React.useState(false);
  const[searchQuery,setSearchQuery]=React.useState(null); // null = not searching, string = results page
  const[notifCount,setNotifCount]=React.useState(3); // unread count badge
  const mainRef=React.useRef(null);
  const toast=useToast();

  // navigate: change route, close drawer, scroll to top of main column.
  const navigate=React.useCallback((r)=>{
    setRoute(r);
    setSelectedPiece(null);
    setSearchQuery(null);
    if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:"smooth"});
    window.scrollTo({top:0,behavior:"smooth"});
  },[]);

  const handleSearch=React.useCallback((q)=>{
    setSearchQuery(q);
    setSelectedPiece(null);
    if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:"smooth"});
  },[]);

  function handleLogin(user,pass){
    if(user==="admin"&&pass==="admin"){setScreen("app");setLoginError(false);return true;}
    setLoginError(true);return false;
  }
  function handleRegister(){setScreen("app");}
  function handleLogout(){window.location.href="../landing/index.html";}

  if(screen==="login")return<LoginScreen onLogin={handleLogin} onGoRegister={()=>{setLoginError(false);setScreen("register");}} error={loginError}/>;
  if(screen==="register")return<RegisterScreen onGoLogin={()=>setScreen("login")} onRegister={handleRegister}/>;

  const titles={dashboard:{title:"Painel",crumb:"Bem-vinda"},arara:{title:"Minha arara",crumb:"Estoque · Coleção atual"},looks:{title:"Looks",crumb:"Curadoria"},vendas:{title:"Vendas",crumb:"Histórico · Maio 2026"},relatorios:{title:"Relatórios",crumb:"Análises · Últimos 90 dias"},consignacao:{title:"Consignação",crumb:"Parceiras · Maio 2026"},agenda:{title:"Agenda",crumb:"Próximos compromissos"}};
  const t=searchQuery?{title:"Busca",crumb:"Resultados"}:(titles[route]||titles.dashboard);
  let pageScreen;
  if(searchQuery)pageScreen=<SearchResultsPage query={searchQuery} onBack={()=>setSearchQuery(null)}/>;
  else if(route==="dashboard")pageScreen=<Dashboard onOpenPiece={setSelectedPiece}onNavigate={navigate}onCadastrar={()=>setCadastrando(true)}/>;
  else if(route==="arara")pageScreen=<AraraScreen onOpenPiece={setSelectedPiece}onCadastrar={()=>setCadastrando(true)}/>;
  else if(route==="looks")pageScreen=<LooksScreen/>;
  else if(route==="vendas")pageScreen=<VendasScreen/>;
  else if(route==="relatorios")pageScreen=<RelatoriosScreen/>;
  else if(route==="consignacao")pageScreen=<ConsignacaoScreen/>;
  else if(route==="agenda")pageScreen=<AgendaScreen/>;
  else pageScreen=<Page><Card padding={48}tone="sand"style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-display)",fontStyle:"italic",fontSize:28,color:"var(--ma-brown-900)",marginBottom:12}}>Em breve</div><div style={{fontSize:16,color:"var(--ma-brown-700)",maxWidth:480,margin:"0 auto",lineHeight:1.6}}>Esta área ainda está em curadoria. Em breve você vai encontrar aqui ferramentas dedicadas a {t.title.toLowerCase()}.</div></Card></Page>;

  return(
    <div style={layoutStyles.app}>
      <style>{`@keyframes authFadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`}</style>
      <Sidebar active={route}onNavigate={navigate}/>
      <div ref={mainRef} className="ma-main"style={layoutStyles.main}>
        {/* Topbar */}
        <header className="ma-topbar"style={layoutStyles.topbar}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--ma-taupe-500)",marginBottom:2}}>{t.crumb}</div>
            <div style={{fontFamily:"var(--font-sans)",fontWeight:600,fontSize:20,color:"var(--ma-olive-900)",letterSpacing:"-0.01em"}}>{t.title}</div>
          </div>
          <SearchBox onSearch={handleSearch}/>
          {/* notification bell with badge */}
          <div style={{position:"relative"}}>
            <IconButton label="Notificações" onClick={()=>{setShowNotifs(o=>!o);setNotifCount(0);}}>
              <IconBell size={18}/>
            </IconButton>
            {notifCount>0&&(
              <span style={{position:"absolute",top:-3,right:-3,background:"var(--ma-clay-500)",color:"#fff",fontSize:10,fontWeight:700,borderRadius:999,minWidth:17,height:17,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px",pointerEvents:"none",lineHeight:1}}>
                {notifCount}
              </span>
            )}
          </div>
          <Button icon={<IconPlus size={16}/>}onClick={()=>setCadastrando(true)}>Cadastrar peça</Button>
          <UserMenu onLogout={handleLogout}/>
        </header>
        <div key={searchQuery||route}>{pageScreen}</div>
      </div>
      <BottomNav active={route}onNavigate={navigate}/>
      {selectedPiece&&<PieceDetail piece={selectedPiece}onClose={()=>setSelectedPiece(null)}/>}
      {cadastrando&&<CadastroPeca onClose={()=>setCadastrando(false)}/>}
      {showNotifs&&<NotificationsDrawer onClose={()=>setShowNotifs(false)} onNavigate={navigate}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ToastProvider><App/></ToastProvider>);
  </script>

</body>
</html>
